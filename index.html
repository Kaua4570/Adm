<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel ADM</title>

<style>
body {
  background: #0d0d0d;
  color: white;
  font-family: Arial;
  padding: 20px;
}

h1 {
  margin-bottom: 20px;
}

.card {
  background: #1a1a1a;
  padding: 15px;
  border-radius: 10px;
  margin-top: 15px;
}

select {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  background: #111;
  color: white;
  border: 1px solid #333;
}

</style>
</head>

<body>

<h1>Painel ADM</h1>

<select id="placaSelect" onchange="buscarDados()">
  <option value="">Selecione a placa</option>
</select>

<div class="card">
  <p><b>Último motorista:</b> <span id="motorista">-</span></p>
  <p><b>KM atual:</b> <span id="km">-</span></p>
  <p><b>Jornada:</b> <span id="jornada">-</span></p>
</div>

<div class="card">
  <b>Histórico:</b>
  <ul id="historico"></ul>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbzpG5LrPDrIPfU4hP7ptpW1UZgOm40NLayt5Th7hJR-Yu9OawkmetQP4F2KASg1747v/exec";

let dados = [];

async function carregar() {
  try {
    const res = await fetch(API);
    dados = await res.json();

    const placas = [...new Set(dados.map(i => i.placa))];

    const select = document.getElementById("placaSelect");

    placas.forEach(p => {
      const opt = document.createElement("option");
      opt.value = p;
      opt.innerText = p;
      select.appendChild(opt);
    });

  } catch (e) {
    alert("Erro ao conectar com API");
  }
}

function buscarDados() {
  const placa = document.getElementById("placaSelect").value;

  const filtrado = dados
    .filter(i => i.placa === placa)
    .sort((a,b) => new Date(b.data) - new Date(a.data));

  if (filtrado.length === 0) return;

  const ultimo = filtrado[0];

  document.getElementById("motorista").innerText = ultimo.motorista;
  document.getElementById("km").innerText = ultimo.km;
  document.getElementById("jornada").innerText = ultimo.jornada;

  const hist = document.getElementById("historico");
  hist.innerHTML = "";

  filtrado.forEach(item => {
    const li = document.createElement("li");
    li.innerText = `${item.data} - ${item.motorista} - ${item.km}KM (${item.jornada})`;
    hist.appendChild(li);
  });
}

carregar();
</script>

</body>
</html>
