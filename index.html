<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Painel ADM</title>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: Arial;
  margin: 0;
  display: flex;
  justify-content: center;

  background: url("fundo.png") no-repeat center center fixed;
  background-size: cover;
}

/* 🔥 camada escura */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  z-index: -1;
}

.container {
  width: 100%;
  max-width: 420px;
  padding: 20px;
  color: white;
}

h1 {
  text-align: center;
}

select {
  width: 100%;
  padding: 14px;
  border-radius: 10px;
  margin-bottom: 15px;
  border: none;
  background: #1e1e1e;
  color: #fff;
}

.card {
  background: #121212;
  padding: 15px;
  border-radius: 15px;
  margin-bottom: 15px;
  box-shadow: 0 0 10px rgba(0,0,0,0.5);
}

ul {
  padding-left: 20px;
}

li {
  margin-bottom: 8px;
  color: #ddd;
}

canvas {
  background: #1a1a1a;
  border-radius: 10px;
  padding: 10px;
}
</style>

</head>

<body>

<div class="container">

<h1>Painel ADM</h1>

<!-- 🔥 CORREÇÃO AQUI -->
<select id="placaSelect" onchange="selecionarPlaca()">
  <option value="">Selecione a placa</option>
</select>

<div class="card">
  <p><b>Último motorista:</b> <span id="motorista">-</span></p>
  <p><b>KM atual:</b> <span id="km">-</span></p>
  <p><b>Jornada:</b> <span id="jornada">-</span></p>
  <p><b>Veículo:</b> <span id="veiculo">-</span></p>
</div>

<div class="card">
  <h3>Histórico:</h3>
  <ul id="historico"></ul>
</div>

<div class="card">
  <h3>Gráfico de KM</h3>
  <canvas id="graficoKm"></canvas>
</div>

</div>

<script src="script.js"></script>

</body>
</html>
