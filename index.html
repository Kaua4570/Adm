<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Painel ADM</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <h1>Painel ADM</h1>

  <div class="container">

    <select id="placaSelect" onchange="carregarDados()">
      <option value="">Selecione a placa</option>
    </select>

    <div class="card">
      <p><strong>Último motorista:</strong> <span id="motorista">-</span></p>
<p><strong>KM atual:</strong> <span id="km">-</span></p>
<p><strong>Jornada:</strong> <span id="jornada">-</span></p>
<p><strong>Veículo:</strong> <span id="veiculo">-</span></p>
    </div>

    <div class="card">
      <p><b>Histórico:</b></p>
      <ul id="historico"></ul>
    </div>

  </div>

  <script src="script.js"></script>

</body>
</html>
