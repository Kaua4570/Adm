<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel ADM</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Painel ADM</h1>

<div class="filtros">
  <select id="placaSelect">
    <option value="">Todas as placas</option>
  </select>

  <input type="text" id="buscaMotorista" placeholder="Buscar motorista">

  <input type="date" id="filtroData">
</div>

<div class="card destaque">
  <h3>Último Registro</h3>
  <p><b>Motorista:</b> <span id="motorista">-</span></p>
  <p><b>KM:</b> <span id="km">-</span></p>
  <p><b>Jornada:</b> <span id="jornada">-</span></p>
  <p><b>Veículo:</b> <span id="veiculo">-</span></p>
</div>

<div class="card">
  <h3>Histórico</h3>
  <ul id="historico"></ul>
</div>

<script src="script.js"></script>

</body>
</html>
